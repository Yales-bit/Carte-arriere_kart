kibot:
  version: 1

outputs:
  - name: "Export_Schema_PDF"
    type: pdf_sch_print
    dir: "Schema"
    options:
      output: "schema_complet.pdf" # Nom de fichier fixe

  - name: "Rendu_PCB_Top"
    type: pcbdraw
    dir: "Visuels"
    options:
      format: jpg
      output: "pcb_preview.jpg"   # Nom de fichier fixe
      show_components: none